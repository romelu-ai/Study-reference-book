<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOKLOG — 参考書進捗管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

:root {
  --bg: #080c10;
  --bg2: #0d1318;
  --bg3: #121a22;
  --panel: #0f1820;
  --border: #1a2d3f;
  --cyan: #00e5ff;
  --cyan-dim: #00b8cc;
  --green: #39ff6e;
  --orange: #ff7b00;
  --yellow: #f0e040;
  --red: #ff3c5a;
  --text: #cde4f0;
  --text-dim: #5a7a8a;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Zen Kaku Gothic New', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

body::before {
  content: '';
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,12,16,0.95);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  height: 52px;
}
.logo {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--cyan);
  letter-spacing: 3px;
  text-shadow: 0 0 12px var(--cyan);
  flex-shrink: 0;
}
.logo span { display: none; }
.header-stats {
  display: flex;
  gap: 10px;
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}
.header-stats b { color: var(--cyan); }

/* ── LAYOUT ── */
.layout {
  position: relative;
  z-index: 1;
  padding: 12px 12px 100px;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  align-items: center;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text-dim);
  cursor: pointer;
  -webkit-transition: all .15s;
  transition: all .15s;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  min-height: 34px;
}
.filter-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0,229,255,0.08);
}

/* FAB 追加ボタン */
.add-btn {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  right: 20px;
  z-index: 150;
  font-family: var(--mono);
  font-size: 22px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: none;
  background: var(--cyan);
  color: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,229,255,0.4);
  -webkit-transition: transform .15s, box-shadow .15s;
  transition: transform .15s, box-shadow .15s;
  line-height: 1;
}
.add-btn:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(0,229,255,0.3); }

/* ── BOOK GRID（1列） ── */
.book-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── BOOK CARD ── */
.book-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  -webkit-transition: border-color .15s;
  transition: border-color .15s;
  -webkit-user-select: none;
  user-select: none;
}
.book-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--subject-color, var(--cyan));
  opacity: 0.8;
}
.book-card:active { opacity: 0.85; }
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card-subject {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--subject-color, var(--cyan));
  color: var(--subject-color, var(--cyan));
}
.card-actions { display: flex; gap: 4px; }
.card-action-btn {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 6px;
  -webkit-transition: all .1s;
  transition: all .1s;
  min-width: 44px;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-action-btn:active { background: rgba(0,229,255,0.12); color: var(--cyan); }
.card-action-btn.del:active { background: rgba(255,60,90,0.12); color: var(--red); }
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.35;
}

/* progress */
.progress-section { margin-bottom: 8px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.progress-label b { color: var(--text); }
.progress-track {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill { height: 100%; border-radius: 3px; -webkit-transition: width .4s ease; transition: width .4s ease; }
.fill-page { background: linear-gradient(90deg, var(--cyan-dim), var(--cyan)); }
.fill-prob { background: linear-gradient(90deg, #39cc5a, var(--green)); }

.card-meta {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}
.card-memo {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-style: italic;
}

/* empty */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
  font-family: var(--mono);
}
.empty-state .big { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 13px; letter-spacing: 1px; line-height: 1.8; }

/* ── OVERLAY → ボトムシート ── */
.overlay {
  display: flex;
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px);
  align-items: flex-end;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  pointer-events: none;
  -webkit-transition: opacity .25s, visibility .25s;
  transition: opacity .25s, visibility .25s;
}
.overlay.open {
  visibility: visible;
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 640px;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  -webkit-transform: translateY(40px);
  transform: translateY(40px);
  -webkit-transition: transform .25s ease;
  transition: transform .25s ease;
  padding-bottom: var(--safe-bottom);
}
.overlay.open .modal {
  -webkit-transform: translateY(0);
  transform: translateY(0);
}

/* ドラッグハンドル */
.modal::before {
  content: '';
  display: block;
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg2);
  z-index: 1;
}
.modal-title {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--cyan);
}
.modal-close {
  font-family: var(--mono);
  font-size: 20px;
  color: var(--text-dim);
  background: rgba(255,255,255,0.06);
  border: none;
  cursor: pointer;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.modal-close:active { color: var(--red); background: rgba(255,60,90,0.1); }
.modal-body { padding: 16px; }

/* forms */
.form-row { margin-bottom: 14px; }
.form-label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 16px; /* iOS zoom防止 */
  padding: 12px 14px;
  border-radius: 8px;
  outline: none;
  -webkit-appearance: none;
  -webkit-transition: border-color .15s;
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--cyan); }
.form-select option { background: var(--bg3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.preset-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.preset-bar::-webkit-scrollbar { display: none; }
.preset-chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  min-height: 34px;
  -webkit-transition: all .1s;
  transition: all .1s;
}
.preset-chip:active { border-color: var(--orange); color: var(--orange); }
.preset-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.btn {
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 1px;
  padding: 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid;
  -webkit-transition: all .15s;
  transition: all .15s;
  flex: 1;
  text-align: center;
  min-height: 48px;
}
.btn-cancel { border-color: var(--border); background: rgba(255,255,255,0.04); color: var(--text-dim); }
.btn-save { border-color: var(--cyan); background: rgba(0,229,255,0.1); color: var(--cyan); }
.btn-save:active { background: rgba(0,229,255,0.22); }

/* ── DETAIL MODAL ── */
.detail-modal { max-width: 640px; }
.detail-section { margin-bottom: 20px; }
.detail-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--cyan);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 12px;
}

.big-progress {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.big-prog-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.big-prog-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 6px; }
.big-prog-nums { font-family: var(--mono); font-size: 20px; color: var(--text); margin-bottom: 6px; }
.big-prog-nums span { font-size: 12px; color: var(--text-dim); }
.big-prog-pct { font-family: var(--mono); font-size: 11px; margin-bottom: 6px; }

.update-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.update-row .form-input { flex: 1; }
.btn-update {
  font-family: var(--mono);
  font-size: 12px;
  padding: 12px 14px;
  border: 1px solid var(--green);
  background: rgba(57,255,110,0.08);
  color: var(--green);
  cursor: pointer;
  border-radius: 8px;
  white-space: nowrap;
  min-height: 48px;
  -webkit-transition: all .15s;
  transition: all .15s;
}
.btn-update:active { background: rgba(57,255,110,0.2); }

/* logs */
.log-list {
  max-height: 180px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
}
.log-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text-dim);
}
.log-item:last-child { border-bottom: none; }
.log-item .log-note { color: var(--text); flex: 1; line-height: 1.5; }
.log-item .log-del {
  color: var(--border);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 16px;
  padding: 0 4px;
  min-width: 28px;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.log-item .log-del:active { color: var(--red); }
.log-empty { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: center; padding: 16px; }

.log-add-row { display: flex; gap: 8px; margin-top: 10px; }
.log-add-row .form-input { flex: 1; }
.btn-log {
  font-family: var(--mono);
  font-size: 12px;
  padding: 12px 14px;
  border: 1px solid var(--orange);
  background: rgba(255,123,0,0.08);
  color: var(--orange);
  cursor: pointer;
  border-radius: 8px;
  white-space: nowrap;
  min-height: 48px;
  -webkit-transition: all .15s;
  transition: all .15s;
}
.btn-log:active { background: rgba(255,123,0,0.2); }

/* memo */
.memo-display {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
  color: var(--text-dim);
  min-height: 60px;
  white-space: pre-wrap;
  line-height: 1.6;
}
.btn-edit-memo {
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 18px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 8px;
  min-height: 44px;
  -webkit-transition: all .15s;
  transition: all .15s;
}
.btn-edit-memo:active { border-color: var(--cyan); color: var(--cyan); }

/* ── CHECK TABLE ── */
.check-table-wrap {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg3);
  overflow: hidden;
}
.check-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
}
.check-table thead tr { background: rgba(0,0,0,0.4); }
.check-table th {
  padding: 10px 8px;
  color: var(--text-dim);
  font-weight: normal;
  font-size: 10px;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  white-space: nowrap;
}
.check-table th.left { text-align: left; padding-left: 12px; }
.check-table td {
  padding: 8px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text);
  vertical-align: middle;
  text-align: center;
}
.check-table td.left { text-align: left; padding-left: 12px; }
.check-table .unit-row td {
  background: rgba(0,229,255,0.06);
  color: var(--cyan);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.check-cell { display: flex; gap: 4px; justify-content: center; }
.check-box {
  width: 34px; height: 34px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: rgba(0,0,0,0.3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  -webkit-transition: all .12s;
  transition: all .12s;
  flex-shrink: 0;
  -webkit-user-select: none;
  user-select: none;
}
.check-box.ok  { background: rgba(57,255,110,0.15); border-color: #39ff6e; color: #39ff6e; }
.check-box.ng  { background: rgba(255,60,90,0.15);  border-color: #ff3c5a; color: #ff3c5a; }
.check-box.sk  { background: rgba(240,224,64,0.12); border-color: #f0e040; color: #f0e040; }
.check-legend {
  display: flex; gap: 10px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  margin-bottom: 10px; align-items: center;
}
.check-legend span { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 12px; height: 12px; border-radius: 2px; border: 1px solid; display: inline-block; }

/* 問題追加 */
.add-prob-section {
  margin-top: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}
.add-prob-title { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px; }
.add-prob-row { display: flex; flex-direction: column; gap: 8px; }
.add-prob-row .form-input { width: 100%; }
.add-prob-row-inner { display: flex; gap: 8px; }
.add-prob-row-inner .form-input { flex: 1; }
.btn-add-prob {
  font-family: var(--mono); font-size: 13px;
  padding: 14px;
  border: 1px solid var(--cyan); background: rgba(0,229,255,0.08);
  color: var(--cyan); cursor: pointer; border-radius: 8px;
  white-space: nowrap; -webkit-transition: all .15s; transition: all .15s;
  width: 100%; min-height: 48px;
}
.btn-add-prob:active { background: rgba(0,229,255,0.2); }
.prob-del {
  color: var(--border); cursor: pointer; background: none;
  border: none; font-size: 18px; font-family: var(--mono);
  min-width: 34px; min-height: 34px;
  display: flex; align-items: center; justify-content: center;
}
.prob-del:active { color: var(--red); }

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── BOOK COVER IMAGE ── */
.card-cover {
  width: 72px;
  height: 72px;
  border-radius: 8px;
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
  background: var(--bg3);
  border: 1px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-transition: border-color .15s;
  transition: border-color .15s;
}
.card-cover:active { border-color: var(--cyan); }
.card-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-cover-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  text-align: center;
  padding: 4px;
  pointer-events: none;
}
.card-cover-empty .icon { font-size: 22px; opacity: 0.35; }
.card-cover input[type="file"] {
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.card-cover-change {
  position: absolute;
  bottom: 3px; right: 3px;
  font-size: 9px;
  padding: 2px 4px;
  background: rgba(0,0,0,0.65);
  color: var(--cyan);
  border-radius: 3px;

var STORAGE_KEY = 'booklog_v2';
var books = [];
var currentFilter = '全て';
var editingDetailId = null;

function initDefaultBooks() {
  return PRESETS.map(function(p) {
    var bulkKey = findBulkKey(p.title);
    return {
      id:          uid(),
      title:       p.title,
      subject:     p.subject,
      series:      p.series || '',
      totalPage:   p.totalPage || 0,
      totalProb:   p.totalProb || 0,
      memo:        '',
      currentPage: 0,
      solvedProb:  0,
      problems:    bulkKey ? JSON.parse(JSON.stringify(BULK_PROBLEMS[bulkKey])) : [],
      logs:        [],
    };
  });
}

function findBulkKey(title) {
  var key = Object.keys(BULK_PROBLEMS).find(function(k){
    return title === k || title.indexOf(k) !== -1 || k.indexOf(title) !== -1;
  });
  if (!key && title.indexOf('ポラリス') !== -1) key = '英語長文ポラリス';
  return key || null;
}

function load() {
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      books = JSON.parse(stored) || [];
    } else {
      books = initDefaultBooks();
      save();
    }
  } catch(e) {
    books = initDefaultBooks();
    save();
  }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}
function pct(val, total) {
  if (!total || total === 0) return 0;
  return Math.min(100, Math.round(val / total * 100));
}

function cycleCheck(val) {
  if (!val || val === '') return 'ok';
  if (val === 'ok') return 'ng';
  if (val === 'ng') return 'sk';
  return '';
}
function checkIcon(val) {
  if (val === 'ok') return '○';
  if (val === 'ng') return '✕';
  if (val === 'sk') return '△';
  return '';
}

// ── 単元情報を集計する ──────────────────────────────
function buildUnitMap(probs) {
  var units = [];
  var unitMap = {};
  (probs || []).forEach(function(p, i) {
    var u = p.unit || '未分類';
    if (!unitMap[u]) { unitMap[u] = []; units.push(u); }
    unitMap[u].push({p:p, i:i});
  });
  return { units: units, unitMap: unitMap };
}

function renderGrid() {
  var grid = document.getElementById('book-grid');
  var filtered = currentFilter === '全て' ? books : books.filter(function(b){ return b.subject === currentFilter; });
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="big">📚</div><p>参考書がありません<br>「＋ 追加」から登録してください</p></div>';
    updateHeader();
    return;
  }

  filtered.forEach(function(book) {
    var pagePct  = pct(book.currentPage || 0, book.totalPage || 0);
    var probPct  = pct(book.solvedProb || 0, book.totalProb || 0);
    var probs    = book.problems || [];
    var solved   = probs.filter(function(p){ return p.checks && p.checks[0] && p.checks[0] !== ''; }).length;
    var card = document.createElement('div');
    card.className = 'book-card';
    card.setAttribute('data-subj', book.subject);
    card.setAttribute('data-id', book.id);

    var pageBar = book.totalPage > 0
      ? '<div class="progress-section"><div class="progress-label"><span>ページ進捗</span><b>' + (book.currentPage||0) + ' / ' + book.totalPage + 'p</b></div><div class="progress-track"><div class="progress-fill fill-page" style="width:' + pagePct + '%"></div></div></div>' : '';

    var probBar = book.totalProb > 0
      ? '<div class="progress-section"><div class="progress-label"><span>問題進捗</span><b>' + (book.solvedProb||0) + ' / ' + book.totalProb + '問</b></div><div class="progress-track"><div class="progress-fill fill-prob" style="width:' + probPct + '%"></div></div></div>' : '';

    var probBadge = probs.length > 0 ? '<span>チェック <b style="color:var(--green)">' + solved + '/' + probs.length + '問</b></span>' : '';
    var logCount = (book.logs||[]).length;

    var coverHtml = '';
    if (book.coverImage) {
      coverHtml = '<div class="card-cover" data-cover-id="' + book.id + '">' +
        '<img src="' + book.coverImage + '" alt="書影">' +
        '<span class="card-cover-change">📷 変更</span>' +
        '<input type="file" accept="image/*" data-cover-upload="' + book.id + '">' +
      '</div>';
    } else {
      coverHtml = '<div class="card-cover" data-cover-id="' + book.id + '">' +
        '<div class="card-cover-empty"><span class="icon">📚</span><span>書影をタップして追加</span></div>' +
        '<input type="file" accept="image/*" data-cover-upload="' + book.id + '">' +
      '</div>';
    }

    card.innerHTML =
      '<div class="card-top">' +
        '<span class="card-subject">' + book.subject + '</span>' +
        '<div class="card-actions">' +
          '<button class="card-action-btn" data-edit="' + book.id + '">編集</button>' +
          '<button class="card-action-btn del" data-del="' + book.id + '">削除</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-header-row">' +
        '<div class="card-header-left">' +
          '<div class="card-title">' + esc(book.title) + (book.series ? ' <span style="font-weight:400;font-size:12px;color:var(--text-dim)">(' + esc(book.series) + ')</span>' : '') + '</div>' +
        '</div>' +
        coverHtml +
      '</div>' +
      pageBar + probBar +
      '<div class="card-meta">' +
        probBadge +
        '<span>ログ <b style="color:var(--orange)">' + logCount + '件</b></span>' +
      '</div>' +
      (book.memo ? '<div class="card-memo">' + esc(book.memo) + '</div>' : '');

    card.addEventListener('click', function(e) {
      if (e.target.closest('[data-edit]') || e.target.closest('[data-del]')) return;
      openDetail(book.id);
    });
    grid.appendChild(card);
  });

  document.querySelectorAll('[data-cover-upload]').forEach(function(input) {
    input.addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var bookId = input.dataset.coverUpload;
      var book = books.find(function(b){ return b.id === bookId; });
      if (!book) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        book.coverImage = ev.target.result;
        save(); renderGrid();
      };
      reader.readAsDataURL(file);
    });
  });

  document.querySelectorAll('[data-edit]').forEach(function(btn) {
    btn.addEventListener('click', function(e) { e.stopPropagation(); openEdit(btn.dataset.edit); });
  });
  document.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function(e) { e.stopPropagation(); deleteBook(btn.dataset.del); });
  });

  updateHeader();
}

function updateHeader() {
  var count = books.length;
  var pagePcts = books.filter(function(b){ return b.totalPage > 0; }).map(function(b){ return pct(b.currentPage||0, b.totalPage); });
  var probPcts = books.filter(function(b){ return b.totalProb > 0; }).map(function(b){ return pct(b.solvedProb||0, b.totalProb); });
  var avgP = pagePcts.length ? Math.round(pagePcts.reduce(function(a,b){return a+b;},0)/pagePcts.length) : 0;
  var avgQ = probPcts.length ? Math.round(probPcts.reduce(function(a,b){return a+b;},0)/probPcts.length) : 0;
  document.getElementById('hd-count').textContent = count;
  document.getElementById('hd-page').textContent  = avgP + '%';
  document.getElementById('hd-prob').textContent  = avgQ + '%';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deleteBook(id) {
  if (!confirm('この参考書を削除しますか？')) return;
  books = books.filter(function(b){ return b.id !== id; });
  save(); renderGrid();
}

var editMode = false;
var editId   = null;

var pendingCoverImage = null;

function resetCoverPreview() {
  pendingCoverImage = null;
  var wrap = document.getElementById('f-cover-wrap');
  if (!wrap) return;
  wrap.innerHTML =
    '<div class="form-cover-empty"><span class="icon">📷</span><span>タップして画像を選択</span></div>' +
    '<input type="file" accept="image/*" id="f-cover-input">';

}

function setCoverPreview(dataUrl) {
  pendingCoverImage = dataUrl;
  var wrap = document.getElementById('f-cover-wrap');
  if (!wrap) return;
  wrap.innerHTML =
    '<img src="' + dataUrl + '" alt="書影">' +
    '<input type="file" accept="image/*" id="f-cover-input">';

function bindCoverInput() {
  var inp = document.getElementById('f-cover-input');
  if (!inp) return;
  inp.addEventListener('change', function(e) {

    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { setCoverPreview(ev.target.result); };
    reader.readAsDataURL(file);

function openAdd() {
  editMode = false; editId = null;
  document.getElementById('f-title').value = '';
  document.getElementById('f-subject').value = '英語';
  document.getElementById('f-series').value = '';
  document.getElementById('f-total-page').value = '';
  document.getElementById('f-total-prob').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('bulk-badge').style.display = 'none';
  resetCoverPreview();
  document.querySelector('#add-overlay .modal-title').textContent = '// ADD BOOK';
  document.getElementById('add-overlay').classList.add('open');
}
function openEdit(id) {
  var book = books.find(function(b){ return b.id === id; });
  if (!book) return;
  editMode = true; editId = id;
  document.getElementById('f-title').value      = book.title || '';
  document.getElementById('f-subject').value    = book.subject || '英語';
  document.getElementById('f-series').value     = book.series || '';
  document.getElementById('f-total-page').value = book.totalPage || '';
  document.getElementById('f-total-prob').value = book.totalProb || '';
  document.getElementById('f-memo').value       = book.memo || '';
  if (book.coverImage) { setCoverPreview(book.coverImage); }
  else { resetCoverPreview(); }
  document.querySelector('#add-overlay .modal-title').textContent = '// EDIT BOOK';
  document.getElementById('add-overlay').classList.add('open');
}
function closeAdd() { document.getElementById('add-overlay').classList.remove('open'); }

function buildPresets() {
  var bar = document.getElementById('preset-bar');
  PRESETS.forEach(function(p) {
    var chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = p.title + (p.series ? ' ('+p.series+')' : '');
    chip.addEventListener('click', function() {
      document.getElementById('f-title').value      = p.title;
      document.getElementById('f-subject').value    = p.subject;
      document.getElementById('f-series').value     = p.series || '';
      document.getElementById('f-total-page').value = p.totalPage || '';
      document.getElementById('f-total-prob').value = p.totalProb || '';
      var hasBulk = !!findBulkKey(p.title);
      document.getElementById('bulk-badge').style.display = hasBulk ? 'inline' : 'none';
    });
    bar.appendChild(chip);
  });
}

function saveBook() {
  var title = document.getElementById('f-title').value.trim();
  if (!title) { alert('書籍名を入力してください'); return; }
  var data = {
    title:     title,
    subject:   document.getElementById('f-subject').value,
    series:    document.getElementById('f-series').value.trim(),
    totalPage: parseInt(document.getElementById('f-total-page').value) || 0,
    totalProb: parseInt(document.getElementById('f-total-prob').value) || 0,
    memo:      document.getElementById('f-memo').value.trim(),
  };
  if (pendingCoverImage !== null) data.coverImage = pendingCoverImage;
  if (editMode) {
    var book = books.find(function(b){ return b.id === editId; });
    if (book) Object.assign(book, data);
  } else {
    data.id          = uid();
    data.currentPage = 0;
    data.solvedProb  = 0;
    data.logs        = [];
    var bulkKey = findBulkKey(title);
    data.problems = bulkKey ? JSON.parse(JSON.stringify(BULK_PROBLEMS[bulkKey])) : [];
    books.push(data);
  }
  save(); closeAdd(); renderGrid();
}

// ── 目次ビューを描画 ─────────────────────────────────────────
function renderTocView(book, container) {
  var probs = book.problems || [];
  var info = buildUnitMap(probs);
  var units = info.units;
  var unitMap = info.unitMap;

  var tocHtml = '';

  if (units.length === 0) {
    tocHtml = '<div class="toc-empty">単元データがありません<br>問題を追加すると目次が表示されます</div>';
  } else {
    tocHtml = '<div class="toc-grid" id="toc-grid">';
    units.forEach(function(u) {
      var items = unitMap[u];
      var total = items.length;
      var done  = items.filter(function(it){ return it.p.checks && it.p.checks[0] && it.p.checks[0] !== ''; }).length;
      var p     = pct(done, total);
      var pctColor = p >= 80 ? 'var(--green)' : p >= 40 ? 'var(--yellow)' : 'var(--cyan)';
      tocHtml +=
        '<div class="toc-unit-card" data-toc-unit="' + esc(u) + '">' +
          '<div class="toc-unit-name">' + esc(u) + '</div>' +
          '<div class="toc-unit-stats">' +
            '<span class="toc-unit-count">' + done + '/' + total + '問</span>' +
            '<div class="toc-unit-bar"><div class="toc-unit-bar-fill" style="width:' + p + '%"></div></div>' +
            '<span class="toc-unit-pct" style="color:' + pctColor + '">' + p + '%</span>' +
          '</div>' +
          '<span class="toc-unit-arrow">›</span>' +
        '</div>';
    });
    tocHtml += '</div>';
  }

  container.innerHTML = tocHtml;

  // 単元タップ → 問題ビューへ
  container.querySelectorAll('[data-toc-unit]').forEach(function(card) {
    card.addEventListener('click', function() {
      var unitName = card.dataset.tocUnit;
      showProbView(book, unitName);
    });
  });
}

// ── 問題ビューを描画（特定単元） ─────────────────────────────
function showProbView(book, targetUnit) {
  var tocView  = document.getElementById('toc-view');
  var probView = document.getElementById('prob-view');
  var probViewHeader = document.getElementById('prob-view-header-unit');

  tocView.classList.remove('active');
  probView.classList.add('active');
  if (probViewHeader) probViewHeader.textContent = targetUnit;

  var probContent = document.getElementById('prob-view-content');
  if (!probContent) return;

  var probs = book.problems || [];
  var info = buildUnitMap(probs);
  var unitMap = info.unitMap;
  var items = unitMap[targetUnit] || [];

  if (items.length === 0) {
    probContent.innerHTML = '<div class="log-empty">この単元に問題がありません</div>';
    return;
  }

  var probRows = '';
  items.forEach(function(item) {
    var p = item.p; var i = item.i;
    var checks = p.checks || ['','',''];
    while (checks.length < 3) checks.push('');
    var cells = '';
    for (var r = 0; r < 3; r++) {
      var cv = checks[r] || '';
      cells += '<div class="check-box ' + cv + '" data-pi="' + i + '" data-ri="' + r + '">' + checkIcon(cv) + '</div>';
    }
    var hasNote = !!(p.memo || p.score || (p.tags && p.tags.length));
    probRows +=
      '<div class="prob-row" data-prob-row="' + i + '">' +
        '<div class="drag-handle" data-drag-pi="' + i + '">⠿</div>' +
        '<div class="prob-num-cell">' +
          '<button class="prob-num-btn' + (hasNote ? ' has-note' : '') + '" data-open-pd="' + i + '">' + esc(p.num) + '</button>' +
        '</div>' +
        '<div class="prob-page-cell">' + (p.page ? 'p.' + p.page : '') + '</div>' +
        '<div class="prob-checks-cell">' + cells + '</div>' +
        '<div class="prob-del-cell"><button class="prob-del" data-pi="' + i + '">✕</button></div>' +
      '</div>' +
      '<div class="pd-row" id="pd-row-' + i + '" style="display:none">' +
        renderProbDetail(p, i) +
      '</div>';
  });

  probContent.innerHTML = '<div class="prob-list" id="prob-list">' + probRows + '</div>';

  bindProbListEvents(book, probContent);
}

// ── 問題リストのイベントを束ねる ────────────────────────────
function bindProbListEvents(book2, container) {
  container.querySelectorAll('.check-box').forEach(function(box) {
    box.addEventListener('click', function() {
      var pi = parseInt(box.dataset.pi);
      var ri = parseInt(box.dataset.ri);
      var p = book2.problems[pi];
      if (!p.checks) p.checks = ['','',''];
      while (p.checks.length < 3) p.checks.push('');
      p.checks[ri] = cycleCheck(p.checks[ri]);
      box.className = 'check-box ' + (p.checks[ri] || '');
      box.textContent = checkIcon(p.checks[ri]);

      var solved = book2.problems.filter(function(prob) {
        return prob.checks && prob.checks[0] && prob.checks[0] !== '';
      }).length;
      book2.solvedProb = solved;
      save();
      renderGrid();
      // 目次の進捗も更新
      var tocView = document.getElementById('toc-view');
      if (tocView) renderTocView(book2, tocView);
    });
  });

  container.querySelectorAll('.prob-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      book2.problems.splice(parseInt(btn.dataset.pi), 1);
      save();
      openDetail(book2.id);
    });
  });

  container.querySelectorAll('[data-open-pd]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pi = btn.dataset.openPd;
      var row = document.getElementById('pd-row-' + pi);
      if (!row) return;
      var isOpen = row.style.display !== 'none';
      container.querySelectorAll('.pd-row').forEach(function(r){ r.style.display = 'none'; });
      if (!isOpen) row.style.display = '';
    });
  });

  container.querySelectorAll('[data-close-pd]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var row = document.getElementById('pd-row-' + btn.dataset.closePd);
      if (row) row.style.display = 'none';
    });
  });

  container.querySelectorAll('.score-star').forEach(function(star) {
    star.addEventListener('click', function() {
      var pi = parseInt(star.dataset.pi);
      var val = parseInt(star.dataset.star);
      var p = book2.problems[pi];
      p.score = (p.score === val) ? 0 : val;
      var panel = document.getElementById('pd-panel-' + pi);
      if (panel) {
        panel.querySelectorAll('.score-star').forEach(function(s) {
          s.classList.toggle('lit', parseInt(s.dataset.star) <= p.score);
        });
        var scoreLabel = panel.querySelector('.score-stars + span');
        if (scoreLabel) scoreLabel.textContent = p.score ? p.score + '/5' : '未評価';
      }
      save();
    });
  });

  container.querySelectorAll('.pd-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      var pi = parseInt(tag.dataset.pi);
      var p = book2.problems[pi];
      if (!p.tags) p.tags = [];
      var t = tag.dataset.tag;
      var idx = p.tags.indexOf(t);
      if (idx === -1) { p.tags.push(t); tag.classList.add('selected'); }
      else { p.tags.splice(idx, 1); tag.classList.remove('selected'); }
      save();
    });
  });

  container.querySelectorAll('[data-save-pd]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pi = parseInt(btn.dataset.savePd);
      var p = book2.problems[pi];
      var panel = document.getElementById('pd-panel-' + pi);
      if (!panel) return;
      var numInput  = panel.querySelector('[data-field="num"]');
      var pageInput = panel.querySelector('[data-field="page"]');
      var unitInput = panel.querySelector('[data-field="unit"]');
      var memoArea  = panel.querySelector('.pd-memo-area');
      if (numInput)  p.num  = numInput.value.trim() || p.num;
      if (pageInput) p.page = pageInput.value.trim();
      if (unitInput) p.unit = unitInput.value.trim() || p.unit;
      if (memoArea)  p.memo = memoArea.value.trim();
      save();
      openDetail(book2.id);
    });
  });
}

function renderDetail(book, keepEditMode) {
  document.getElementById('det-title-bar').textContent = '// ' + book.title;
  var body = document.getElementById('det-body');

  var pagePct = pct(book.currentPage||0, book.totalPage||0);
  var probPct = pct(book.solvedProb||0, book.totalProb||0);

  var pageBox = book.totalPage > 0 ? (
    '<div class="big-prog-box">' +
      '<div class="big-prog-label">PAGE PROGRESS</div>' +
      '<div class="big-prog-nums">' + (book.currentPage||0) + '<span> / ' + book.totalPage + 'p</span></div>' +
      '<div class="big-prog-pct" style="color:var(--cyan)">' + pagePct + '%</div>' +
      '<div class="progress-track"><div class="progress-fill fill-page" style="width:' + pagePct + '%"></div></div>' +
      '<div class="update-row">' +
        '<input class="form-input" id="det-page-input" type="number" min="0" max="' + book.totalPage + '" placeholder="現在ページ" value="' + (book.currentPage||0) + '">' +
        '<button class="btn-update" id="det-page-btn">更新</button>' +

  var probBox = book.totalProb > 0 ? (
    '<div class="big-prog-box">' +
      '<div class="big-prog-label">PROBLEM PROGRESS</div>' +
      '<div class="big-prog-nums">' + (book.solvedProb||0) + '<span> / ' + book.totalProb + '問</span></div>' +
      '<div class="big-prog-pct" style="color:var(--green)">' + probPct + '%</div>' +
      '<div class="progress-track"><div class="progress-fill fill-prob" style="width:' + probPct + '%"></div></div>' +
      '<div class="update-row">' +
        '<input class="form-input" id="det-prob-input" type="number" min="0" max="' + book.totalProb + '" placeholder="解いた問題数" value="' + (book.solvedProb||0) + '">' +
        '<button class="btn-update" id="det-prob-btn">更新</button>' +

  var probs = book.problems || [];
  var hasBulkReset = !!findBulkKey(book.title);
  var hasUnits = probs.length > 0 && buildUnitMap(probs).units.length > 0;

  var logItems = '';
  var logs = (book.logs||[]).slice().reverse();

    logItems +=
      '<div class="log-item">' +

        '<button class="log-del" data-li="' + i + '">✕</button>' +
      '</div>';
  });

  // ── CHECK TABLE セクション：目次ビュー＋問題ビューの2ペイン ──
  var checkSectionHtml =
    '<div class="detail-section">' +
      '<div class="detail-section-title" style="display:flex;align-items:center;gap:8px">CHECK TABLE — 問題別チェック' +
        (hasBulkReset ? '<button id="btn-bulk-reset" style="margin-left:auto;font-family:var(--mono);font-size:9px;padding:5px 10px;border:1px solid var(--text-dim);background:none;color:var(--text-dim);cursor:pointer;border-radius:20px">↺ リセット</button>' : '') +
      '</div>' +
      '<div class="check-legend">' +
        '<span><span class="leg-dot" style="background:rgba(57,255,110,.2);border-color:#39ff6e"></span>○ 正解</span>' +
        '<span><span class="leg-dot" style="background:rgba(255,60,90,.2);border-color:#ff3c5a"></span>✕ 不正解</span>' +
        '<span><span class="leg-dot" style="background:rgba(240,224,64,.15);border-color:#f0e040"></span>△ 要復習</span>' +
      '</div>' +

      // 目次ビュー
      '<div class="toc-view active" id="toc-view"></div>' +

      // 問題ビュー
      '<div class="prob-view" id="prob-view">' +
        '<div class="prob-view-header">' +
          '<button class="btn-back-toc" id="btn-back-toc">← 目次</button>' +
          '<span class="prob-view-unit-name" id="prob-view-header-unit"></span>' +
          '<button class="prob-edit-btn" id="btn-prob-edit-mode">✎ 編集</button>' +
        '</div>' +
        '<div id="prob-view-content"></div>' +
      '</div>' +

      // 問題追加（常に表示）
      '<div class="add-prob-section">' +
        '<div class="add-prob-title">▸ 問題を追加</div>' +
        '<div class="add-prob-row">' +
          '<input class="form-input" id="np-unit" placeholder="単元名 (例: 力学)">' +
          '<div class="add-prob-row-inner">' +
            '<input class="form-input" id="np-prefix" placeholder="接頭辞 (例: 問題、第)" style="flex:1">' +
            '<input class="form-input" id="np-from" type="number" placeholder="開始番号" style="flex:1">' +
            '<span style="font-family:var(--mono);font-size:14px;color:var(--text-dim);align-self:center;flex-shrink:0">〜</span>' +
            '<input class="form-input" id="np-to" type="number" placeholder="終了番号" style="flex:1">' +
          '</div>' +
          '<div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin:-4px 0 4px">※ 単体追加は開始番号のみ入力。接頭辞省略可。</div>' +
          '<button class="btn-add-prob" id="np-add">＋ 追加</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  body.innerHTML =
    '<div class="detail-section">' +
      '<div class="detail-section-title">PROGRESS</div>' +
      '<div class="big-progress">' + pageBox + probBox + '</div>' +
    '</div>' +

    checkSectionHtml +

    '<div class="detail-section">' +
      '<div class="detail-section-title">STUDY LOG — 学習ログ</div>' +
      '<div class="log-list">' + (logItems || '<div class="log-empty">ログなし</div>') + '</div>' +
      '<div class="log-add-row">' +
        '<input class="form-input" id="log-note" placeholder="例: p.120-140 完了、大問3やり直し">' +
        '<button class="btn-log" id="log-add">記録</button>' +
      '</div>' +
    '</div>' +

    '<div class="detail-section">' +
      '<div class="detail-section-title">MEMO</div>' +
      '<div class="memo-display" id="memo-display">' + (esc(book.memo) || '<span style="opacity:.4">メモなし</span>') + '</div>' +
      '<textarea class="form-textarea" id="memo-edit" style="display:none;margin-top:8px">' + esc(book.memo||'') + '</textarea>' +
      '<div style="display:flex;gap:8px;margin-top:8px">' +
        '<button class="btn-edit-memo" id="btn-memo-edit">編集</button>' +
        '<button class="btn-update" id="btn-memo-save" style="display:none">保存</button>' +
      '</div>' +
    '</div>';

  var book2 = book;

  // 目次を描画
  var tocViewEl = document.getElementById('toc-view');
  renderTocView(book2, tocViewEl);

  // ← 目次ボタン
  document.getElementById('btn-back-toc').addEventListener('click', function() {
    document.getElementById('prob-view').classList.remove('active');
    document.getElementById('toc-view').classList.add('active');
    // 目次を再描画（チェック更新を反映）
    renderTocView(book2, tocViewEl);
  });

  // 編集モードボタン（問題ビュー内）
  var probEditBtn = document.getElementById('btn-prob-edit-mode');
  if (probEditBtn) {
    probEditBtn.addEventListener('click', function() {
      var probList = document.getElementById('prob-list');
      if (!probList) return;
      var isActive = probEditBtn.classList.contains('active');
      probEditBtn.classList.toggle('active', !isActive);
      probEditBtn.textContent = !isActive ? '✓ 完了' : '✎ 編集';
      if (probList) probList.classList.toggle('edit-mode', !isActive);
    });
  }

  // バルクリセット
  var bulkResetBtn = document.getElementById('btn-bulk-reset');
  if (bulkResetBtn) {
    bulkResetBtn.addEventListener('click', function() {
      if (!confirm('全問題のチェックをリセットしますか？')) return;
      (book2.problems || []).forEach(function(p){ p.checks = ['','','']; });
      save(); openDetail(book2.id);
    });
  }

  if (book2.totalPage > 0) {
    document.getElementById('det-page-btn').addEventListener('click', function() {
      var v = parseInt(document.getElementById('det-page-input').value) || 0;
      book2.currentPage = Math.min(v, book2.totalPage);
      save(); renderGrid(); openDetail(book2.id);
    });
  }
  if (book2.totalProb > 0) {
    document.getElementById('det-prob-btn').addEventListener('click', function() {
      var v = parseInt(document.getElementById('det-prob-input').value) || 0;
      book2.solvedProb = Math.min(v, book2.totalProb);
      save(); renderGrid(); openDetail(book2.id);
    });
  }

  document.getElementById('np-add').addEventListener('click', function() {
    var unit   = document.getElementById('np-unit').value.trim() || '未分類';
    var prefix = document.getElementById('np-prefix').value.trim();
    var from   = parseInt(document.getElementById('np-from').value);
    var to     = parseInt(document.getElementById('np-to').value);
    if (isNaN(from)) { alert('開始番号を入力してください'); return; }
    if (isNaN(to)) to = from;
    if (to < from) { alert('終了番号は開始番号以上にしてください'); return; }
    if (to - from > 500) { alert('一度に追加できるのは500問までです'); return; }
    if (!book2.problems) book2.problems = [];
    book2.problems = book2.problems.filter(function(p) { return p.unit !== unit; });
    for (var n = from; n <= to; n++) {
      book2.problems.push({ unit: unit, num: prefix + n, checks: ['','',''] });
    }
    book2.totalProb = book2.problems.length;
    save(); openDetail(book2.id);
  });

  document.querySelectorAll('.log-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      book2.logs.splice(parseInt(btn.dataset.li), 1);
      save(); openDetail(book2.id);
    });
  });

  document.getElementById('log-add').addEventListener('click', function() {
    var note = document.getElementById('log-note').value.trim();
    if (!note) return;
    if (!book2.logs) book2.logs = [];
    var now = new Date();
    var d = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    book2.logs.push({ date: d, note: note });
    save(); openDetail(book2.id);
  });

  document.getElementById('btn-memo-edit').addEventListener('click', function() {
    document.getElementById('memo-display').style.display = 'none';
    document.getElementById('memo-edit').style.display    = 'block';
    document.getElementById('btn-memo-edit').style.display = 'none';
    document.getElementById('btn-memo-save').style.display = 'inline-block';
  });
  document.getElementById('btn-memo-save').addEventListener('click', function() {
    book2.memo = document.getElementById('memo-edit').value.trim();
    save(); renderGrid(); openDetail(book2.id);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  load();
  buildPresets();
  renderGrid();
  bindCoverInput();

  document.getElementById('open-add').addEventListener('click', openAdd);
  document.getElementById('close-add').addEventListener('click', closeAdd);
  document.getElementById('cancel-add').addEventListener('click', closeAdd);
  document.getElementById('save-add').addEventListener('click', saveBook);
  document.getElementById('close-detail').addEventListener('click', closeDetail);

  document.getElementById('add-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeAdd();
  });
  document.getElementById('detail-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGrid();
    });
  });
});
</script>
</body>
</html>
