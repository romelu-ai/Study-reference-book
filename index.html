<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOKLOG — データ書き出し</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');
:root {
  --bg: #080c10; --bg2: #0d1318; --bg3: #121a22; --panel: #0f1820;
  --border: #1a2d3f; --cyan: #00e5ff; --cyan-dim: #00b8cc;
  --green: #39ff6e; --orange: #ff7b00; --yellow: #f0e040; --red: #ff3c5a;
  --text: #cde4f0; --text-dim: #5a7a8a;
  --mono: 'Share Tech Mono', monospace; --sans: 'Zen Kaku Gothic New', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--sans);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
.box {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 18px; padding: 32px 24px;
}
.logo {
  font-family: var(--mono); font-size: 22px; color: var(--cyan);
  letter-spacing: 4px; text-shadow: 0 0 16px var(--cyan);
  text-align: center; margin-bottom: 6px;
}
.sub {
  font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  text-align: center; letter-spacing: 2px; margin-bottom: 28px;
}
.status {
  font-family: var(--mono); font-size: 13px;
  padding: 14px 16px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  margin-bottom: 20px; line-height: 1.9;
}
.status b { color: var(--cyan); }
.status.warn b { color: var(--red); }
.btn-export {
  width: 100%; font-family: var(--mono); font-size: 15px;
  letter-spacing: 2px; padding: 16px; border-radius: 10px;
  border: 1px solid var(--cyan); background: rgba(0,229,255,0.1);
  color: var(--cyan); cursor: pointer;
  transition: all .15s; min-height: 52px; margin-bottom: 16px;
}
.btn-export:hover { background: rgba(0,229,255,0.2); }
.btn-export:disabled {
  opacity: 0.4; cursor: not-allowed;
  border-color: var(--border); color: var(--text-dim); background: none;
}
.note {
  font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  line-height: 1.8; padding: 12px; border-radius: 8px;
  border: 1px solid rgba(255,123,0,0.25); background: rgba(255,123,0,0.05);
}
.note b { color: var(--orange); }
</style>
</head>
<body>
<div class="box">
  <div class="logo">BOOKLOG</div>
  <div class="sub">// データ書き出しツール</div>
  <div class="status" id="status">読み込み中...</div>
  <button class="btn-export" id="btn-export" disabled>↓ データをファイルに保存する</button>
  <div class="note">
    <b>使い方：</b><br>
    ① このページでボタンを押してJSONファイルを保存<br>
    ② 新しいBOOKLOGを開いてログイン<br>
    ③ ヘッダーの「↑ 復元」からそのファイルを選択
  </div>
</div>

<script>
var STORAGE_KEY = 'booklog_v2';
var books = [];

window.addEventListener('DOMContentLoaded', function() {
  var statusEl = document.getElementById('status');
  var btn      = document.getElementById('btn-export');

  // localStorage から読み込み（旧バージョンのキー）
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      books = JSON.parse(raw) || [];
    }
  } catch(e) {
    books = [];
  }

  if (books.length === 0) {
    statusEl.className = 'status warn';
    statusEl.innerHTML =
      '<b>データが見つかりませんでした</b><br>' +
      'このブラウザ・このページにデータが存在しません。<br>' +
      '古いBOOKLOGを開いていたブラウザと同じブラウザで開いてください。';
    return;
  }

  var totalProbs = books.reduce(function(s, b) {
    return s + ((b.problems || []).length);
  }, 0);
  var solved = books.reduce(function(s, b) {
    return s + (b.problems || []).filter(function(p) {
      return p.checks && p.checks[0] && p.checks[0] !== '';
    }).length;
  }, 0);

  statusEl.innerHTML =
    '✅ データを検出しました<br>' +
    '参考書: <b>' + books.length + ' 冊</b><br>' +
    '問題データ: <b>' + totalProbs + ' 問</b>（チェック済: ' + solved + ' 問）<br>' +
    'ログ件数: <b>' + books.reduce(function(s,b){return s+(b.logs||[]).length;},0) + ' 件</b>';

  btn.disabled = false;
  btn.addEventListener('click', function() {
    var payload = {
      version: 2,
      exportedAt: new Date().toISOString(),
      userId: 'legacy_export',
      books: books,
    };
    var json = JSON.stringify(payload, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url  = URL.createObjectURL(blob);
    var now  = new Date();
    var stamp = now.getFullYear()
      + String(now.getMonth()+1).padStart(2,'0')
      + String(now.getDate()).padStart(2,'0');
    var a = document.createElement('a');
    a.href = url;
    a.download = 'booklog_backup_' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(function() {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 500);

    btn.textContent = '✓ 保存しました！';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    btn.style.background = 'rgba(57,255,110,0.1)';
    setTimeout(function() {
      btn.textContent = '↓ データをファイルに保存する';
      btn.style.borderColor = '';
      btn.style.color = '';
      btn.style.background = '';
    }, 3000);
  });
});
</script>
</body>
</html>
