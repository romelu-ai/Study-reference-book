<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOKLOG — 参考書進捗管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

:root {
  --bg: #080c10;
  --bg2: #0d1318;
  --bg3: #121a22;
  --panel: #0f1820;
  --border: #1a2d3f;
  --cyan: #00e5ff;
  --cyan-dim: #00b8cc;
  --green: #39ff6e;
  --orange: #ff7b00;
  --yellow: #f0e040;
  --red: #ff3c5a;
  --text: #cde4f0;
  --text-dim: #5a7a8a;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Zen Kaku Gothic New', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,12,16,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 56px;
}
.logo {
  font-family: var(--mono);
  font-size: 22px;
  color: var(--cyan);
  letter-spacing: 4px;
  text-shadow: 0 0 16px var(--cyan);
  flex-shrink: 0;
}
.logo span { color: var(--text-dim); font-size: 11px; letter-spacing: 2px; display: block; margin-top: -4px; }
.header-stats {
  display: flex;
  gap: 20px;
  margin-left: auto;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
}
.header-stats b { color: var(--cyan); }

.layout {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
}

.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.filter-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 5px 14px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text-dim);
  cursor: pointer;
  transition: all .15s;
  border-radius: 2px;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0,229,255,0.06);
}
.add-btn {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 12px;
  padding: 7px 18px;
  border: 1px solid var(--cyan);
  background: rgba(0,229,255,0.08);
  color: var(--cyan);
  cursor: pointer;
  letter-spacing: 2px;
  transition: all .15s;
  border-radius: 2px;
}
.add-btn:hover {
  background: rgba(0,229,255,0.18);
  box-shadow: 0 0 12px rgba(0,229,255,0.2);
}

.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.book-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 18px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  position: relative;
  overflow: hidden;
}
.book-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--subject-color, var(--cyan));
  opacity: 0.7;
}
.book-card:hover {
  border-color: var(--subject-color, var(--cyan));
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.card-subject {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  padding: 3px 8px;
  border-radius: 2px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--subject-color, var(--cyan));
  color: var(--subject-color, var(--cyan));
}
.card-actions { display: flex; gap: 8px; }
.card-action-btn {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
  transition: color .1s;
}
.card-action-btn:hover { color: var(--cyan); }
.card-action-btn.del:hover { color: var(--red); }
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.3;
}

.progress-section { margin-bottom: 10px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.progress-label b { color: var(--text); }
.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .4s ease;
}
.fill-page  { background: linear-gradient(90deg, var(--cyan-dim), var(--cyan)); }
.fill-prob  { background: linear-gradient(90deg, #39cc5a, var(--green)); }

.card-meta {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}
.card-meta span b { color: var(--yellow); }
.card-memo {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-style: italic;
}

.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
  font-family: var(--mono);
}
.empty-state .big { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 13px; letter-spacing: 1px; }

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 100%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp .2s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--cyan);
}
.modal-close {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--text-dim);
  background: none;
  border: none;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: var(--red); }
.modal-body { padding: 22px; }

.form-row { margin-bottom: 16px; }
.form-label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 9px 12px;
  border-radius: 3px;
  outline: none;
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--cyan);
}
.form-select option { background: var(--bg3); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.preset-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.preset-chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 2px;
  transition: all .1s;
}
.preset-chip:hover {
  border-color: var(--orange);
  color: var(--orange);
}
.preset-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.btn-row {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 9px 22px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid;
  transition: all .15s;
}
.btn-cancel { border-color: var(--border); background: none; color: var(--text-dim); }
.btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }
.btn-save { border-color: var(--cyan); background: rgba(0,229,255,0.1); color: var(--cyan); }
.btn-save:hover { background: rgba(0,229,255,0.2); box-shadow: 0 0 10px rgba(0,229,255,0.15); }

.detail-modal { max-width: 700px; }
.detail-section { margin-bottom: 22px; }
.detail-section-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--cyan);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 14px;
}

.big-progress {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.big-prog-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
}
.big-prog-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 8px; }
.big-prog-nums {
  font-family: var(--mono);
  font-size: 24px;
  color: var(--text);
  margin-bottom: 8px;
}
.big-prog-nums span { font-size: 13px; color: var(--text-dim); }
.big-prog-pct {
  font-family: var(--mono);
  font-size: 11px;
  margin-bottom: 6px;
}

.update-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.update-row .form-input { flex: 1; }
.btn-update {
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 14px;
  border: 1px solid var(--green);
  background: rgba(57,255,110,0.08);
  color: var(--green);
  cursor: pointer;
  border-radius: 3px;
  white-space: nowrap;
  transition: all .15s;
}
.btn-update:hover { background: rgba(57,255,110,0.18); }

.log-list {
  max-height: 200px;
  overflow-y: auto;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px;
}
.log-item {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text-dim);
}
.log-item:last-child { border-bottom: none; }
.log-item .log-note { color: var(--text); flex: 1; margin: 0 8px; }
.log-item .log-del {
  color: var(--border);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
}
.log-item .log-del:hover { color: var(--red); }
.log-empty { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: center; padding: 16px; }

.log-add-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.log-add-row .form-input { flex: 1; }
.btn-log {
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 12px;
  border: 1px solid var(--orange);
  background: rgba(255,123,0,0.08);
  color: var(--orange);
  cursor: pointer;
  border-radius: 3px;
  white-space: nowrap;
  transition: all .15s;
}
.btn-log:hover { background: rgba(255,123,0,0.18); }

.memo-display {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px;
  font-size: 13px;
  color: var(--text-dim);
  min-height: 60px;
  white-space: pre-wrap;
}
.btn-edit-memo {
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 3px;
  transition: all .15s;
}
.btn-edit-memo:hover { border-color: var(--cyan); color: var(--cyan); }

.check-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg3);
}
.check-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
  min-width: 480px;
}
.check-table thead tr { background: rgba(0,0,0,0.3); }
.check-table th {
  padding: 8px 10px;
  color: var(--text-dim);
  font-weight: normal;
  font-size: 10px;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  white-space: nowrap;
}
.check-table th.left { text-align: left; }
.check-table td {
  padding: 6px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text);
  vertical-align: middle;
  text-align: center;
}
.check-table td.left { text-align: left; }
.check-table tr:hover td { background: rgba(255,255,255,0.02); }
.check-table .unit-row td {
  background: rgba(0,229,255,0.05);
  color: var(--cyan);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.check-cell { display: flex; gap: 5px; justify-content: center; }
.check-box {
  width: 24px; height: 24px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: rgba(0,0,0,0.3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all .12s;
  flex-shrink: 0;
  user-select: none;
}
.check-box:hover { border-color: var(--text-dim); }
.check-box.ok  { background: rgba(57,255,110,0.15); border-color: #39ff6e; color: #39ff6e; }
.check-box.ng  { background: rgba(255,60,90,0.15);  border-color: #ff3c5a; color: #ff3c5a; }
.check-box.sk  { background: rgba(240,224,64,0.12); border-color: #f0e040; color: #f0e040; }
.check-legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  margin-bottom: 10px; align-items: center;
}
.check-legend span { display: flex; align-items: center; gap: 5px; }
.leg-dot {
  width: 12px; height: 12px; border-radius: 2px; border: 1px solid; display: inline-block;
}
.add-prob-section {
  margin-top: 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px;
}
.add-prob-title {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px;
}
.add-prob-row {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end;
}
.add-prob-row .form-input { flex: 2; min-width: 100px; }
.add-prob-row .form-input.narrow { flex: 1; min-width: 70px; }
.btn-add-prob {
  font-family: var(--mono); font-size: 11px; padding: 8px 14px;
  border: 1px solid var(--cyan); background: rgba(0,229,255,0.08);
  color: var(--cyan); cursor: pointer; border-radius: 3px;
  white-space: nowrap; transition: all .15s;
}
.btn-add-prob:hover { background: rgba(0,229,255,0.18); }
.prob-del {
  color: var(--border); cursor: pointer; background: none;
  border: none; font-size: 13px; font-family: var(--mono); padding: 0 4px;
}
.prob-del:hover { color: var(--red); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

[data-subj="英語"]   { --subject-color: #00e5ff; }
[data-subj="数学"]   { --subject-color: #39ff6e; }
[data-subj="化学"]   { --subject-color: #ff7b00; }
[data-subj="物理"]   { --subject-color: #a78bfa; }
[data-subj="生物"]   { --subject-color: #86efac; }
[data-subj="国語"]   { --subject-color: #f0e040; }
[data-subj="日本史"] { --subject-color: #fb923c; }
[data-subj="世界史"] { --subject-color: #f472b6; }
[data-subj="地理"]   { --subject-color: #34d399; }
[data-subj="その他"] { --subject-color: #94a3b8; }
</style>
</head>
<body>

<header>
  <div class="logo">BOOKLOG<span>参考書進捗管理</span></div>
  <div class="header-stats">
    <span>冊数 <b id="hd-count">0</b></span>
    <span>平均ページ <b id="hd-page">0%</b></span>
    <span>平均問題 <b id="hd-prob">0%</b></span>
  </div>
</header>

<div class="layout">
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="全て">全て</button>
    <button class="filter-btn" data-filter="英語">英語</button>
    <button class="filter-btn" data-filter="数学">数学</button>
    <button class="filter-btn" data-filter="化学">化学</button>
    <button class="filter-btn" data-filter="物理">物理</button>
    <button class="filter-btn" data-filter="生物">生物</button>
    <button class="filter-btn" data-filter="国語">国語</button>
    <button class="filter-btn" data-filter="日本史">日本史</button>
    <button class="filter-btn" data-filter="世界史">世界史</button>
    <button class="filter-btn" data-filter="地理">地理</button>
    <button class="filter-btn" data-filter="その他">その他</button>
    <button class="add-btn" id="open-add">＋ 追加</button>
  </div>
  <div class="book-grid" id="book-grid"></div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">// ADD BOOK</span>
      <button class="modal-close" id="close-add">✕</button>
    </div>
    <div class="modal-body">
      <div class="preset-label">▸ プリセットから選択 <span id="bulk-badge" style="display:none;font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(57,255,110,0.1);border:1px solid var(--green);padding:2px 8px;border-radius:2px;margin-left:8px">✓ 問題データあり（自動登録）</span></div>
      <div class="preset-bar" id="preset-bar"></div>
      <div class="form-row">
        <label class="form-label">書籍名 *</label>
        <input class="form-input" id="f-title" placeholder="例: 鉄壁英単語">
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">科目 *</label>
          <select class="form-select" id="f-subject">
            <option>英語</option><option>数学</option><option>化学</option>
            <option>物理</option><option>生物</option><option>国語</option>
            <option>日本史</option><option>世界史</option><option>地理</option><option>その他</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">版 / シリーズ</label>
          <input class="form-input" id="f-series" placeholder="例: 改訂版">
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">総ページ数</label>
          <input class="form-input" id="f-total-page" type="number" min="0" placeholder="0">
        </div>
        <div class="form-row">
          <label class="form-label">総問題数</label>
          <input class="form-input" id="f-total-prob" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">メモ</label>
        <textarea class="form-textarea" id="f-memo" placeholder="目標・使い方など"></textarea>

var STORAGE_KEY = 'booklog_v2';
var books = [];
var currentFilter = '全て';
var editingDetailId = null;

function initDefaultBooks() {
  return PRESETS.map(function(p) {
    var bulkKey = findBulkKey(p.title);
    return {
      id:          uid(),
      title:       p.title,
      subject:     p.subject,
      series:      p.series || '',
      totalPage:   p.totalPage || 0,
      totalProb:   p.totalProb || 0,
      memo:        '',
      currentPage: 0,
      solvedProb:  0,
      problems:    bulkKey ? JSON.parse(JSON.stringify(BULK_PROBLEMS[bulkKey])) : [],
      logs:        [],
    };
  });
}

function findBulkKey(title) {
  var key = Object.keys(BULK_PROBLEMS).find(function(k){
    return title === k || title.indexOf(k) !== -1 || k.indexOf(title) !== -1;
  });
  if (!key && title.indexOf('ポラリス') !== -1) key = '英語長文ポラリス';
  return key || null;
}

function load() {
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      books = JSON.parse(stored) || [];
    } else {
      books = initDefaultBooks();
      save();
    }
  } catch(e) {
    books = initDefaultBooks();
    save();
  }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}
function pct(val, total) {
  if (!total || total === 0) return 0;
  return Math.min(100, Math.round(val / total * 100));
}

function cycleCheck(val) {
  if (!val || val === '') return 'ok';
  if (val === 'ok') return 'ng';
  if (val === 'ng') return 'sk';
  return '';
}
function checkIcon(val) {
  if (val === 'ok') return '○';
  if (val === 'ng') return '✕';
  if (val === 'sk') return '△';
  return '';
}

function renderGrid() {
  var grid = document.getElementById('book-grid');
  var filtered = currentFilter === '全て' ? books : books.filter(function(b){ return b.subject === currentFilter; });
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="big">📚</div><p>参考書がありません<br>「＋ 追加」から登録してください</p></div>';
    updateHeader();
    return;
  }

  filtered.forEach(function(book) {
    var pagePct  = pct(book.currentPage || 0, book.totalPage || 0);
    var probPct  = pct(book.solvedProb || 0, book.totalProb || 0);
    var probs    = book.problems || [];
    var solved   = probs.filter(function(p){ return p.checks && p.checks[0] && p.checks[0] !== ''; }).length;
    var card = document.createElement('div');
    card.className = 'book-card';
    card.setAttribute('data-subj', book.subject);
    card.setAttribute('data-id', book.id);

    var pageBar = book.totalPage > 0
      ? '<div class="progress-section"><div class="progress-label"><span>ページ進捗</span><b>' + (book.currentPage||0) + ' / ' + book.totalPage + 'p</b></div><div class="progress-track"><div class="progress-fill fill-page" style="width:' + pagePct + '%"></div></div></div>' : '';

    var probBar = book.totalProb > 0
      ? '<div class="progress-section"><div class="progress-label"><span>問題進捗</span><b>' + (book.solvedProb||0) + ' / ' + book.totalProb + '問</b></div><div class="progress-track"><div class="progress-fill fill-prob" style="width:' + probPct + '%"></div></div></div>' : '';

    var probBadge = probs.length > 0 ? '<span>チェック <b style="color:var(--green)">' + solved + '/' + probs.length + '問</b></span>' : '';
    var logCount = (book.logs||[]).length;

    card.innerHTML =
      '<div class="card-top">' +
        '<span class="card-subject">' + book.subject + '</span>' +
        '<div class="card-actions">' +
          '<button class="card-action-btn" data-edit="' + book.id + '">編集</button>' +
          '<button class="card-action-btn del" data-del="' + book.id + '">削除</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-title">' + esc(book.title) + (book.series ? ' <span style="font-weight:400;font-size:12px;color:var(--text-dim)">(' + esc(book.series) + ')</span>' : '') + '</div>' +
      pageBar + probBar +
      '<div class="card-meta">' +
        probBadge +
        '<span>ログ <b style="color:var(--orange)">' + logCount + '件</b></span>' +
      '</div>' +
      (book.memo ? '<div class="card-memo">' + esc(book.memo) + '</div>' : '');

    card.addEventListener('click', function(e) {
      if (e.target.closest('[data-edit]') || e.target.closest('[data-del]')) return;
      openDetail(book.id);
    });
    grid.appendChild(card);
  });

  document.querySelectorAll('[data-edit]').forEach(function(btn) {
    btn.addEventListener('click', function(e) { e.stopPropagation(); openEdit(btn.dataset.edit); });
  });
  document.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function(e) { e.stopPropagation(); deleteBook(btn.dataset.del); });
  });

  updateHeader();
}

function updateHeader() {
  var count = books.length;
  var pagePcts = books.filter(function(b){ return b.totalPage > 0; }).map(function(b){ return pct(b.currentPage||0, b.totalPage); });
  var probPcts = books.filter(function(b){ return b.totalProb > 0; }).map(function(b){ return pct(b.solvedProb||0, b.totalProb); });
  var avgP = pagePcts.length ? Math.round(pagePcts.reduce(function(a,b){return a+b;},0)/pagePcts.length) : 0;
  var avgQ = probPcts.length ? Math.round(probPcts.reduce(function(a,b){return a+b;},0)/probPcts.length) : 0;
  document.getElementById('hd-count').textContent = count;
  document.getElementById('hd-page').textContent  = avgP + '%';
  document.getElementById('hd-prob').textContent  = avgQ + '%';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deleteBook(id) {
  if (!confirm('この参考書を削除しますか？')) return;
  books = books.filter(function(b){ return b.id !== id; });
  save(); renderGrid();
}

var editMode = false;
var editId   = null;

function openAdd() {
  editMode = false; editId = null;
  document.getElementById('f-title').value = '';
  document.getElementById('f-subject').value = '英語';
  document.getElementById('f-series').value = '';
  document.getElementById('f-total-page').value = '';
  document.getElementById('f-total-prob').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('bulk-badge').style.display = 'none';
  document.querySelector('#add-overlay .modal-title').textContent = '// ADD BOOK';
  document.getElementById('add-overlay').classList.add('open');
}
function openEdit(id) {
  var book = books.find(function(b){ return b.id === id; });
  if (!book) return;
  editMode = true; editId = id;
  document.getElementById('f-title').value      = book.title || '';
  document.getElementById('f-subject').value    = book.subject || '英語';
  document.getElementById('f-series').value     = book.series || '';
  document.getElementById('f-total-page').value = book.totalPage || '';
  document.getElementById('f-total-prob').value = book.totalProb || '';
  document.getElementById('f-memo').value       = book.memo || '';
  document.querySelector('#add-overlay .modal-title').textContent = '// EDIT BOOK';
  document.getElementById('add-overlay').classList.add('open');
}
function closeAdd() { document.getElementById('add-overlay').classList.remove('open'); }

function buildPresets() {
  var bar = document.getElementById('preset-bar');
  PRESETS.forEach(function(p) {
    var chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = p.title + (p.series ? ' ('+p.series+')' : '');
    chip.addEventListener('click', function() {
      document.getElementById('f-title').value      = p.title;
      document.getElementById('f-subject').value    = p.subject;
      document.getElementById('f-series').value     = p.series || '';
      document.getElementById('f-total-page').value = p.totalPage || '';
      document.getElementById('f-total-prob').value = p.totalProb || '';
      var hasBulk = !!findBulkKey(p.title);
      document.getElementById('bulk-badge').style.display = hasBulk ? 'inline' : 'none';
    });
    bar.appendChild(chip);
  });
}

function saveBook() {
  var title = document.getElementById('f-title').value.trim();
  if (!title) { alert('書籍名を入力してください'); return; }
  var data = {
    title:     title,
    subject:   document.getElementById('f-subject').value,
    series:    document.getElementById('f-series').value.trim(),
    totalPage: parseInt(document.getElementById('f-total-page').value) || 0,
    totalProb: parseInt(document.getElementById('f-total-prob').value) || 0,
    memo:      document.getElementById('f-memo').value.trim(),
  };
  if (editMode) {
    var book = books.find(function(b){ return b.id === editId; });
    if (book) Object.assign(book, data);
  } else {
    data.id          = uid();
    data.currentPage = 0;
    data.solvedProb  = 0;
    data.logs        = [];
    var bulkKey = findBulkKey(title);
    data.problems = bulkKey ? JSON.parse(JSON.stringify(BULK_PROBLEMS[bulkKey])) : [];
    books.push(data);
  }
  save(); closeAdd(); renderGrid();
}

function openDetail(id) {
  editingDetailId = id;
  var book = books.find(function(b){ return b.id === id; });
  if (!book) return;
  renderDetail(book);
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }

function renderDetail(book) {
  document.getElementById('det-title-bar').textContent = '// ' + book.title;
  var body = document.getElementById('det-body');

  var pagePct = pct(book.currentPage||0, book.totalPage||0);
  var probPct = pct(book.solvedProb||0, book.totalProb||0);

  var pageBox = book.totalPage > 0 ? (
    '<div class="big-prog-box">' +
      '<div class="big-prog-label">PAGE PROGRESS</div>' +
      '<div class="big-prog-nums">' + (book.currentPage||0) + '<span> / ' + book.totalPage + 'p</span></div>' +
      '<div class="big-prog-pct" style="color:var(--cyan)">' + pagePct + '%</div>' +
      '<div class="progress-track"><div class="progress-fill fill-page" style="width:' + pagePct + '%"></div></div>' +
      '<div class="update-row">' +
        '<input class="form-input" id="det-page-input" type="number" min="0" max="' + book.totalPage + '" placeholder="現在ページ" value="' + (book.currentPage||0) + '">' +
        '<button class="btn-update" id="det-page-btn">更新</button>' +
      '</div>' +
    '</div>'
  ) : '<div class="big-prog-box" style="opacity:.4"><div class="big-prog-label">PAGE PROGRESS</div><div style="font-family:var(--mono);font-size:12px;color:var(--text-dim)">総ページ数未設定</div></div>';

  var probBox = book.totalProb > 0 ? (
    '<div class="big-prog-box">' +
      '<div class="big-prog-label">PROBLEM PROGRESS</div>' +
      '<div class="big-prog-nums">' + (book.solvedProb||0) + '<span> / ' + book.totalProb + '問</span></div>' +
      '<div class="big-prog-pct" style="color:var(--green)">' + probPct + '%</div>' +
      '<div class="progress-track"><div class="progress-fill fill-prob" style="width:' + probPct + '%"></div></div>' +
      '<div class="update-row">' +
        '<input class="form-input" id="det-prob-input" type="number" min="0" max="' + book.totalProb + '" placeholder="解いた問題数" value="' + (book.solvedProb||0) + '">' +
        '<button class="btn-update" id="det-prob-btn">更新</button>' +
      '</div>' +
    '</div>'
  ) : '<div class="big-prog-box" style="opacity:.4"><div class="big-prog-label">PROBLEM PROGRESS</div><div style="font-family:var(--mono);font-size:12px;color:var(--text-dim)">総問題数未設定</div></div>';

  var probs = book.problems || [];
  var units = [];
  var unitMap = {};
  probs.forEach(function(p, i) {
    var u = p.unit || '未分類';
    if (!unitMap[u]) { unitMap[u] = []; units.push(u); }
    unitMap[u].push({p:p, i:i});
  });

  var tableRows = '';
  units.forEach(function(u) {
    tableRows += '<tr class="unit-row"><td colspan="6">▸ ' + esc(u) + '</td></tr>';
    unitMap[u].forEach(function(item) {
      var p = item.p; var i = item.i;
      var checks = p.checks || ['','',''];
      while (checks.length < 3) checks.push('');
      var cells = '';
      for (var r = 0; r < 3; r++) {
        var cv = checks[r] || '';
        cells += '<td><div class="check-cell"><div class="check-box ' + cv + '" data-pi="' + i + '" data-ri="' + r + '">' + checkIcon(cv) + '</div></div></td>';
      }
      tableRows +=
        '<tr>' +
          '<td class="left">' + esc(p.num) + '</td>' +
          '<td class="left" style="color:var(--text-dim);font-size:10px">' + (p.page ? 'p.' + p.page : '') + '</td>' +
          cells +
          '<td><button class="prob-del" data-pi="' + i + '">✕</button></td>' +
        '</tr>';
    });
  });

  var checkTable = probs.length > 0
    ? '<div class="check-table-wrap"><table class="check-table"><thead><tr>' +
        '<th class="left">問題番号</th><th class="left">ページ</th>' +
        '<th>1回目</th><th>2回目</th><th>3回目</th><th></th>' +
      '</tr></thead><tbody>' + tableRows + '</tbody></table></div>'
    : '<div class="log-empty">問題データなし</div>';

  var logItems = '';
  var logs = (book.logs||[]).slice().reverse();
  logs.forEach(function(log, ri) {
    var i = (book.logs.length - 1) - ri;
    logItems +=
      '<div class="log-item">' +
        '<span style="color:var(--text-dim);flex-shrink:0">' + log.date + '</span>' +
        '<span class="log-note">' + esc(log.note) + '</span>' +
        '<button class="log-del" data-li="' + i + '">✕</button>' +
      '</div>';
  });

  var hasBulkReset = !!findBulkKey(book.title);

  body.innerHTML =
    '<div class="detail-section">' +
      '<div class="detail-section-title">PROGRESS</div>' +
      '<div class="big-progress">' + pageBox + probBox + '</div>' +
    '</div>' +

    '<div class="detail-section">' +
      '<div class="detail-section-title">CHECK TABLE — 問題別チェック' +
        (hasBulkReset ? ' <button id="btn-bulk-reset" style="float:right;font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid var(--text-dim);background:none;color:var(--text-dim);cursor:pointer;border-radius:2px">↺ チェックをリセット</button>' : '') +
      '</div>' +
      '<div class="check-legend">' +
        '<span><span class="leg-dot" style="background:rgba(57,255,110,.2);border-color:#39ff6e"></span>○ 正解</span>' +
        '<span><span class="leg-dot" style="background:rgba(255,60,90,.2);border-color:#ff3c5a"></span>✕ 不正解</span>' +
        '<span><span class="leg-dot" style="background:rgba(240,224,64,.15);border-color:#f0e040"></span>△ 要復習</span>' +
        '<span style="color:var(--text-dim);font-size:9px">※ セルをタップで切り替え</span>' +
      '</div>' +
      checkTable +
      '<div class="add-prob-section">' +
        '<div class="add-prob-title">▸ 問題を追加</div>' +
        '<div class="add-prob-row">' +
          '<input class="form-input" id="np-unit" placeholder="単元名 (例: コンデンサー)">' +
          '<input class="form-input narrow" id="np-page" type="number" placeholder="ページ">' +
          '<input class="form-input narrow" id="np-num" placeholder="問題番号">' +
          '<button class="btn-add-prob" id="np-add">追加</button>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="detail-section">' +
      '<div class="detail-section-title">STUDY LOG — 学習ログ</div>' +
      '<div class="log-list">' + (logItems || '<div class="log-empty">ログなし</div>') + '</div>' +
      '<div class="log-add-row">' +
        '<input class="form-input" id="log-note" placeholder="例: p.120-140 完了、大問3やり直し">' +
        '<button class="btn-log" id="log-add">記録</button>' +
      '</div>' +
    '</div>' +

    '<div class="detail-section">' +
      '<div class="detail-section-title">MEMO</div>' +
      '<div class="memo-display" id="memo-display">' + (esc(book.memo) || '<span style="opacity:.4">メモなし</span>') + '</div>' +
      '<textarea class="form-textarea" id="memo-edit" style="display:none;margin-top:8px">' + esc(book.memo||'') + '</textarea>' +
      '<div style="display:flex;gap:8px;margin-top:8px">' +
        '<button class="btn-edit-memo" id="btn-memo-edit">編集</button>' +
        '<button class="btn-update" id="btn-memo-save" style="display:none">保存</button>' +
      '</div>' +
    '</div>';

  var book2 = book;

  if (book2.totalPage > 0) {
    document.getElementById('det-page-btn').addEventListener('click', function() {
      var v = parseInt(document.getElementById('det-page-input').value) || 0;
      book2.currentPage = Math.min(v, book2.totalPage);
      save(); renderGrid(); openDetail(book2.id);
    });
  }
  if (book2.totalProb > 0) {
    document.getElementById('det-prob-btn').addEventListener('click', function() {
      var v = parseInt(document.getElementById('det-prob-input').value) || 0;
      book2.solvedProb = Math.min(v, book2.totalProb);
      save(); renderGrid(); openDetail(book2.id);
    });
  }

  document.querySelectorAll('.check-box').forEach(function(box) {
    box.addEventListener('click', function() {
      var pi = parseInt(box.dataset.pi);
      var ri = parseInt(box.dataset.ri);
      var p = book2.problems[pi];
      if (!p.checks) p.checks = ['','',''];
      while (p.checks.length < 3) p.checks.push('');
      p.checks[ri] = cycleCheck(p.checks[ri]);
      save(); openDetail(book2.id);
    });
  });

  document.querySelectorAll('.prob-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      book2.problems.splice(parseInt(btn.dataset.pi), 1);
      save(); openDetail(book2.id);
    });
  });

  document.getElementById('np-add').addEventListener('click', function() {
    var unit = document.getElementById('np-unit').value.trim();
    var page = document.getElementById('np-page').value.trim();
    var num  = document.getElementById('np-num').value.trim();
    if (!num) { alert('問題番号を入力してください'); return; }
    if (!book2.problems) book2.problems = [];
    book2.problems.push({ unit: unit || '未分類', page: page, num: num, checks: ['','',''] });
    save(); openDetail(book2.id);
  });

  document.querySelectorAll('.log-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      book2.logs.splice(parseInt(btn.dataset.li), 1);
      save(); openDetail(book2.id);
    });
  });

  document.getElementById('log-add').addEventListener('click', function() {
    var note = document.getElementById('log-note').value.trim();
    if (!note) return;
    if (!book2.logs) book2.logs = [];
    var now = new Date();
    var d = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    book2.logs.push({ date: d, note: note });
    save(); openDetail(book2.id);
  });

  document.getElementById('btn-memo-edit').addEventListener('click', function() {
    document.getElementById('memo-display').style.display = 'none';
    document.getElementById('memo-edit').style.display    = 'block';
    document.getElementById('btn-memo-edit').style.display = 'none';
    document.getElementById('btn-memo-save').style.display = 'inline-block';
  });
  document.getElementById('btn-memo-save').addEventListener('click', function() {
    book2.memo = document.getElementById('memo-edit').value.trim();
    save(); renderGrid(); openDetail(book2.id);
  });

  var bulkResetBtn = document.getElementById('btn-bulk-reset');
  if (bulkResetBtn) {
    bulkResetBtn.addEventListener('click', function() {
      if (!confirm('全問題のチェックをリセットしますか？')) return;
      (book2.problems || []).forEach(function(p){ p.checks = ['','','']; });
      save(); openDetail(book2.id);
    });
  }
}

load();
buildPresets();
renderGrid();

document.getElementById('open-add').addEventListener('click', openAdd);
document.getElementById('close-add').addEventListener('click', closeAdd);
document.getElementById('cancel-add').addEventListener('click', closeAdd);
document.getElementById('save-add').addEventListener('click', saveBook);
document.getElementById('close-detail').addEventListener('click', closeDetail);

document.getElementById('add-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeAdd();
});
document.getElementById('detail-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});
</script>
</body>
</html>
